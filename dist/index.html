erating photo-realistic talking avatar videos from text scripts. It can create custom AI avatars from a short video of yourself, produce multilingual videos with accurate lip-syncing in 40+ languages, and translate existing videos into new languages—making it a powerful tool for scalable video content production.",useCases:["<strong>Corporate Training Videos:</strong> Create professional onboarding and training videos featuring a personalized AI avatar of a presenter, without needing camera crews or studio time.","<strong>Multilingual Marketing:</strong> Record a marketing video once in English and use HeyGen's video translation to produce lip-synced versions in Spanish, French, Mandarin, and dozens more languages.","<strong>Product Demos & Explainers:</strong> Generate clear, engaging product walkthrough videos with an AI avatar presenter by simply typing a script.","<strong>Personalized Sales Videos:</strong> Scale outreach by creating personalized video messages where the AI avatar addresses each prospect by name, boosting reply rates."],gettingStarted:["<strong>Sign Up:</strong> Go to heygen.com and create an account. The free tier lets you create a limited number of videos to test the platform.","<strong>Choose an Avatar:</strong> Browse HeyGen's library of 100+ pre-built stock avatars, or create your own Instant Avatar by recording a short video of yourself.","<strong>Write Your Script:</strong> Type your video script directly in the editor. Select the avatar's voice from the library or clone your own voice with a short recording.","<strong>Customize Your Scene:</strong> Add a background (upload an image, use a video background, or select from presets), adjust the avatar size, and add text overlays or your logo.","<strong>Generate and Download:</strong> Click 'Submit' to generate your video. Once processed, preview the result, make any script edits, and download the final MP4."],tips:["<strong>Use SSML for Natural Speech:</strong> Add SSML tags like <code>&lt;break time='1s'/&gt;</code> in your script to add natural pauses and make the AI voice sound less robotic.","<strong>Create a Custom Avatar Early:</strong> Recording your Instant Avatar takes only 2 minutes but dramatically increases authenticity compared to stock avatars—do it before your first real video.","<strong>Try Video Translation:</strong> Upload an existing video to HeyGen's Video Translation feature to automatically translate it into another language with matching lip-sync—no re-recording needed.","<strong>Batch Videos with API:</strong> Use the HeyGen API to programmatically generate hundreds of personalized videos for sales or onboarding sequences at scale."]},kp={whatIs:"Descript is a text-based video and podcast editor that transcribes your recordings and lets you edit the media by editing the text transcript. Deleting a sentence from the transcript removes it from the video. It also features AI-powered overdub voice cloning, filler word removal, eye contact correction, background noise removal, and screen recording.",useCases:["<strong>Podcast Editing:</strong> Automatically transcribe podcast recordings and edit them like a document—remove 'um's and 'uh's, cut rambling sections, and fix mistakes without hunting through a waveform.","<strong>YouTube & Social Video Editing:</strong> Edit talking-head videos by editing the transcript, add captions automatically, and export clips optimized for different social platforms.","<strong>Overdub Voice Cloning:</strong> Fix misspoken words or add new lines to a recording using your cloned AI voice—type the correction and Descript generates it in your voice seamlessly.","<strong>Screen Recordings & Tutorials:</strong> Record your screen and webcam simultaneously, then edit the whole thing text-first—ideal for software tutorials and demo videos."],gettingStarted:["<strong>Download Descript:</strong> Go to descript.com and download the desktop app for Mac or Windows, or use the web version in your browser.","<strong>Create a New Project:</strong> Click 'New Project' and either record directly in Descript or import an existing audio or video file.","<strong>Wait for Transcription:</strong> Descript will automatically transcribe your media. Once complete, you'll see the full transcript alongside your timeline.","<strong>Edit by Editing Text:</strong> Click anywhere in the transcript and start editing—select text and hit delete to remove those words from the audio/video. Use find-and-replace to make bulk edits.","<strong>Export Your Project:</strong> When done, click 'Publish' or 'Export' to output your final video as an MP4, audio as an MP3, or share a Descript link for team review."],tips:["<strong>Remove Filler Words in One Click:</strong> Go to Edit > Remove Filler Words to automatically detect and delete all instances of 'um,' 'uh,' 'like,' and 'you know' across your entire recording.","<strong>Use Studio Sound:</strong> Enable Studio Sound (Effects panel) to apply AI-powered noise reduction and audio enhancement that makes even poor recording conditions sound professional.","<strong>Scenes for Structure:</strong> Use Scenes to divide your project into sections—each scene is independently editable and makes it easy to reorganize content by dragging and dropping.","<strong>Collaborate with Comments:</strong> Share a review link with clients or team members so they can leave timestamped comments on the video without needing a Descript account."]},zp={whatIs:"InVideo AI is a browser-based AI video generator that creates polished, fully-edited videos from simple text prompts. Describe your video idea and it generates a complete video with stock footage, AI voiceover, subtitles, background music, and transitions—no video editing experience required.",useCases:["<strong>YouTube Content Creation:</strong> Generate informational or listicle-style YouTube videos from a topic prompt, complete with narration and visuals, in under 10 minutes.","<strong>Marketing & Promo Videos:</strong> Create product promotion videos, explainer videos, and social media ads by describing your product and target audience.","<strong>Educational Videos:</strong> Turn a lesson topic or text document into an engaging explainer video with clear narration and relevant visuals for students.","<strong>News & Article Summaries:</strong> Paste a news article or blog post URL and InVideo AI will generate a summarized video version ready for social sharing."],gettingStarted:["<strong>Sign Up:</strong> Go to invideo.io and create a free account. The free plan lets you generate videos with an InVideo watermark to test the workflow.","<strong>Describe Your Video:</strong> Click 'AI Video Generator,' then type a detailed prompt describing your video. Include the topic, target audience, tone, and desired length.","<strong>Choose a Workflow:</strong> Select from options like 'YouTube explainer,' 'Instagram Reel,' or 'Faceless video' to optimize the output format and style.","<strong>Review and Edit:</strong> Once generated, use the editor to swap out stock clips, change the AI voice, edit the script, adjust the music volume, and modify subtitles.","<strong>Export and Publish:</strong> Download your video in the resolution you need (up to 4K on paid plans) or publish directly to YouTube from the platform."],tips:["<strong>Be Specific in Your Prompt:</strong> Instead of 'make a video about dogs,' try <code>'Create a 3-minute YouTube video for dog owners about the top 5 benefits of daily walks for large breeds, with an upbeat and informative tone.'</code>","<strong>Use the iStock Library:</strong> InVideo has a massive built-in stock footage library—use the media panel to search for and swap in more relevant clips for any scene.","<strong>Customize the Avatar:</strong> Use InVideo's AI avatar feature to add a human presenter to your video rather than relying solely on voiceover and B-roll footage.","<strong>Repurpose Long Videos:</strong> Use the 'Clip to Short' feature to automatically extract the most engaging clips from a long video for use as YouTube Shorts or Instagram Reels."]},Ep={whatIs:"Pika is an AI-powered idea-to-video platform that generates short video clips from text prompts and animates still images into motion. It uses cutting-edge video generation models to produce cinematic, creative video content—from realistic scenes to fantastical animations—making it accessible to anyone without filmmaking expertise.",useCases:["<strong>Social Media Clips:</strong> Generate eye-catching 3–10 second video clips from text descriptions for use in social media feeds, stories, and ads.","<strong>Image Animation:</strong> Upload a still photo or illustration and have Pika bring it to life with realistic motion—perfect for animating portraits, landscapes, or artwork.","<strong>Creative Storytelling:</strong> Generate cinematic sequences from scene descriptions to prototype film ideas, music video concepts, or animated story sequences.","<strong>Product Visualization:</strong> Create animated product demos or lifestyle videos by describing how a product looks and moves in a scene."],gettingStarted:["<strong>Sign Up at Pika.art:</strong> Go to pika.art and create an account. New users receive credits to begin generating videos immediately.","<strong>Enter a Text Prompt:</strong> Type a descriptive prompt in the generation box. Include the subject, action, setting, style, and camera movement. Example: <code>'A lone astronaut walking on a red sand desert planet, cinematic wide shot, golden hour lighting.'</code>","<strong>Animate an Image:</strong> Click the image upload button to upload any photo or illustration, then add a motion prompt describing how you want it to move.","<strong>Adjust Camera Controls:</strong> Use Pika's camera control settings to specify movement like zoom in, pan left, or tilt up to give your video a professional cinematic feel.","<strong>Download and Share:</strong> Once generated, preview your clip and download the MP4. You can also use 'Extend' to lengthen the video or 'Retry' for variations."],tips:["<strong>Describe Camera Movement:</strong> Adding camera directions like 'slow zoom in,' 'aerial dolly shot,' or 'handheld shake' to your prompt dramatically improves the cinematic quality of results.","<strong>Use Negative Prompts:</strong> Include negative prompts to avoid unwanted elements—for example: <code>'no text, no watermarks, no distortion'</code> to keep your video clean.","<strong>Start with High-Quality Images:</strong> When animating images, use high-resolution, well-lit photos with clear subjects. The better the source image, the more convincing the animation.","<strong>Iterate Quickly:</strong> Use the 'Retry' button with slight prompt variations to explore different results from the same concept—Pika generates videos in under a minute so iteration is fast."]},xp={whatIs:"Kling AI is a professional AI video generation platform developed by Kuaishou Technology. It supports text-to-video, image-to-video, and lip sync generation with high-quality, physically realistic results. Kling is known for generating longer video clips (up to 3 minutes), realistic motion, and advanced camera controls compared to many competitor platforms.",useCases:["<strong>Text-to-Video Production:</strong> Generate high-quality, realistic video clips up to 3 minutes long from detailed text descriptions—ideal for short films, advertisements, and concept videos.","<strong>Image-to-Video Animation:</strong> Upload a still image and describe the motion to animate it—perfect for bringing product photos, illustrations, or character art to life.","<strong>Lip Sync Videos:</strong> Upload a portrait image and an audio clip to generate a realistic talking-head video with accurate lip synchronization.","<strong>Creative Filmmaking:</strong> Prototype film sequences, music videos, and visual storytelling content using Kling's cinematic camera movement controls."],gettingStarted:["<strong>Access Kling AI:</strong> Go to kling.ai and sign up for an account. The platform offers a free tier with daily credit allowances for generating videos.","<strong>Select a Generation Mode:</strong> Choose between Text to Video, Image to Video, or Lip Sync from the main dashboard based on your creative goal.","<strong>Write a Detailed Prompt:</strong> For text-to-video, describe your scene in detail—include the subject, action, environment, mood, and any specific camera movement or visual style.","<strong>Set Video Parameters:</strong> Choose the video duration (5s, 10s, or up to 3 minutes with extended generation), aspect ratio (16:9, 9:16, or 1:1), and quality tier.","<strong>Generate and Download:</strong> Submit your generation and wait for processing. Preview the result in your gallery, and download the final video as an MP4."],tips:["<strong>Add Physical Motion Details:</strong> Kling excels at realistic physics—describe water splashing, cloth flowing, or hair moving in wind to leverage its realistic motion simulation.","<strong>Use High Mode for Quality:</strong> Choose 'High' quality mode over 'Standard' for important projects—it takes longer but produces significantly sharper, more detailed results.","<strong>Combine Image + Text:</strong> For image-to-video, pair a strong source image with a detailed motion prompt to get the most consistent and controllable results.","<strong>Reference Camera Angles:</strong> Use film terminology in your prompts like 'tracking shot,' 'crane shot,' 'over-the-shoulder,' or 'extreme close-up' to achieve specific cinematic compositions."]},Dp={whatIs:"Tabnine is an enterprise-grade AI coding assistant that provides intelligent code completions, chat-based coding help, and code generation within your IDE. Unlike cloud-only tools, Tabnine offers a private, self-hosted model option that can be trained on your own codebase—ensuring code never leaves your infrastructure, which is critical for enterprises with strict security requirements.",useCases:["<strong>Intelligent Code Completion:</strong> Get full-line and multi-line AI code completions in real time as you type, trained on your team's codebase patterns and coding conventions.","<strong>Enterprise Privacy Compliance:</strong> Deploy Tabnine on-premise or in a private cloud so proprietary source code never leaves your environment—meeting SOC 2, GDPR, and HIPAA requirements.","<strong>Code Chat & Explanation:</strong> Ask Tabnine questions about your codebase directly in the IDE chat—explain functions, find bugs, suggest refactors, and generate unit tests.","<strong>Team Consistency:</strong> Train a custom model on your organization's repositories so suggestions align with your internal coding standards, frameworks, and architecture patterns."],gettingStarted:["<strong>Install the Plugin:</strong> Go to tabnine.com and install the Tabnine plugin for your IDE—it supports VS Code, JetBrains IDEs (IntelliJ, PyCharm, WebStorm), Vim, Neovim, and more.","<strong>Sign In or Create Account:</strong> After installation, sign in to your Tabnine account from within the IDE. The Basic plan is free with AI completions powered by a smaller model.","<strong>Start Coding:</strong> Open any code file and start typing. Tabnine suggestions appear inline as you code—press Tab to accept a suggestion, or Escape to dismiss.","<strong>Use Chat Mode:</strong> Open the Tabnine Chat panel in your IDE sidebar. Ask questions like 'explain this function,' 'write a unit test for this method,' or 'refactor this code to use async/await.'","<strong>Team Setup (Enterprise):</strong> Admins can connect Tabnine to your Git repositories to train a team-specific model that learns from your actual codebase for higher-quality, contextually relevant completions."],tips:["<strong>Write Good Comments:</strong> Tabnine uses your comments as context for suggestions. Write a clear comment describing what the next function should do, and it will often generate the full implementation.","<strong>Use the Chat for Debugging:</strong> Paste an error message or buggy code into Tabnine Chat with the context 'Why is this failing?' to get targeted, contextual debugging help.","<strong>Configure Blocked Suggestions:</strong> In enterprise settings, configure suggestion filters to prevent Tabnine from suggesting code that resembles specific open-source licenses, protecting IP.","<strong>Evaluate with Metrics:</strong> Tabnine's admin dashboard shows completion acceptance rates and productivity metrics—use these to demonstrate ROI and identify which teams benefit most."]},Up={whatIs:"Bolt.new is an AI-powered full-stack app builder from StackBlitz that lets you describe an application in plain language and receive a complete, working codebase in minutes. It runs entirely in the browser with a built-in development environment, instant previews, one-click deployment, and integrations for databases and authentication—no local setup required.",useCases:["<strong>Rapid Prototyping:</strong> Describe an app idea and have a functional prototype with a real frontend, backend, and database ready to demo within minutes—perfect for validating ideas quickly.","<strong>MVP Development:</strong> Build a minimum viable product for a startup or side project by prompting Bolt to create full-stack features like user authentication, CRUD operations, and payment integrations.","<strong>Learning Full-Stack Development:</strong> Students can prompt Bolt to build example apps and study the generated code to learn how React, Node.js, and databases fit together in a real project.","<strong>Client Demos:</strong> Freelancers and agencies can create working interactive demos for client proposals in hours instead of days, giving clients a tangible experience before a project starts."],gettingStarted:["<strong>Go to bolt.new:</strong> Open bolt.new in your browser—no installation needed. Sign in with a GitHub account to save your projects.","<strong>Describe Your App:</strong> Type a prompt describing what you want to build. Be specific: include the type of app, key features, tech preferences, and any design notes. Example: <code>'Build a task management app with user login, drag-and-drop todo lists, and a dark mode UI using React and Supabase.'</code>","<strong>Review the Generated Code:</strong> Bolt generates the project structure and opens it with a live preview. Browse the file tree on the left to see all the generated files and understand the architecture.","<strong>Iterate via Chat:</strong> Ask Bolt to add features, fix bugs, or change designs conversationally. Type requests like 'Add a due date field to each task' and Bolt edits the code automatically.","<strong>Deploy in One Click:</strong> Click 'Deploy' to publish your app to a public URL via Netlify or another connected provider—no configuration needed."],tips:["<strong>Start Simple, Then Expand:</strong> Begin with the core feature of your app before asking Bolt to add complexity. Building incrementally produces more stable results than asking for everything at once.","<strong>Specify Your Tech Stack:</strong> Mention preferred frameworks and libraries in your prompt (e.g., 'use React, TypeScript, and Tailwind CSS') to ensure the generated code matches your preferences.","<strong>Export to Edit Locally:</strong> Click 'Download' to export the full project as a zip file and continue development in your local IDE with your preferred tools.","<strong>Use for Database Design:</strong> Ask Bolt to design a database schema for your use case and it will set up Supabase tables, relationships, and row-level security policies automatically."]},Mp={whatIs:"Lovable is an AI fullstack software engineer that builds complete, production-ready web applications from natural language descriptions. It generates React frontends, Supabase backends, and full authentication flows, while staying synchronized with your GitHub repository so you can collaborate with human developers and deploy with ease.",useCases:["<strong>SaaS App Development:</strong> Describe a software-as-a-service product and Lovable generates the entire frontend, backend API, database schema, and authentication system.","<strong>No-Code Entrepreneurship:</strong> Non-technical founders can build and launch real web products—with user accounts, data storage, and custom business logic—without hiring a development team.","<strong>Rapid Feature Development:</strong> Developers can use Lovable to scaffold new features, pages, and integrations quickly, then review and customize the generated code in GitHub.","<strong>Internal Tools:</strong> Build internal dashboards, admin panels, and data management tools for your team by describing what data you need to display and manage."],gettingStarted:["<strong>Sign Up at Lovable.dev:</strong> Go to lovable.dev and create an account. Connect your GitHub account to enable repository syncing and version control.","<strong>Describe Your App:</strong> In the chat interface, write a detailed description of the app you want to build. Include the core functionality, user roles, and any specific design preferences.","<strong>Watch It Build:</strong> Lovable generates your app in real time, displaying code as it writes it. A live preview updates automatically so you can see the app taking shape.","<strong>Request Changes via Chat:</strong> Continue the conversation to add features, change designs, or fix issues. Say things like 'Add a pricing page with three tiers' or 'Make the dashboard cards show real-time data.'","<strong>Connect to Supabase:</strong> Link a Supabase project to enable a real database, user authentication, and file storage for your app—Lovable configures the connection automatically."],tips:["<strong>Be Detailed Upfront:</strong> The more context you provide in your initial prompt—user flows, feature list, target audience—the less back-and-forth is needed to get the app right.","<strong>Use GitHub Sync:</strong> Keep Lovable synced with your GitHub repo so you can review every commit, roll back changes, and bring in other developers to collaborate on the codebase.","<strong>Break Complex Features Down:</strong> For complex functionality, ask Lovable to build one feature at a time instead of requesting everything at once—this produces more reliable, well-structured code.","<strong>Review Generated Code:</strong> Always review critical sections like authentication logic and database queries before deploying to production, since AI-generated code should be audited for security."]},Ip={whatIs:"v0 is Vercel's AI UI generation tool that produces working React and Next.js components and full applications from text prompts. It generates clean, production-quality code using modern libraries like Tailwind CSS and shadcn/ui, and allows you to deploy directly to Vercel or copy the code into your existing project.",useCases:["<strong>UI Component Generation:</strong> Describe a UI component—like a pricing table, dashboard card, or login form—and get production-ready React code with Tailwind styling that you can drop into any project.","<strong>Full Page & App Scaffolding:</strong> Generate complete page layouts and multi-page Next.js applications from a single prompt, with navigation, responsive design, and component structure included.","<strong>Design to Code:</strong> Upload a screenshot or wireframe and ask v0 to generate the corresponding React code, bridging the gap between design mockups and working implementations.","<strong>Prototyping & Demos:</strong> Rapidly prototype interactive UI concepts to share with stakeholders or test user flows before committing to full implementation."],gettingStarted:["<strong>Go to v0.dev:</strong> Visit v0.dev in your browser and sign in with a Vercel account. New users get free credits to start generating.","<strong>Write a UI Prompt:</strong> Describe the component or page you want in plain language. Be specific about functionality and style. Example: <code>'Create a responsive SaaS pricing page with three tiers (Free, Pro, Enterprise), monthly/annual toggle, and a highlighted recommended plan.'</code>","<strong>Review Generated Output:</strong> v0 generates a live preview alongside the code. Click between the Preview and Code tabs to see both the visual result and the underlying React/Tailwind code.","<strong>Iterate with Follow-Up Prompts:</strong> Use the chat to request changes: 'Make the button color blue,' 'Add a testimonials section,' or 'Make this mobile responsive.' v0 updates the code incrementally.","<strong>Use the Code:</strong> Click 'Copy Code' to paste the component into your project, or 'Open in StackBlitz' to continue editing in a full development environment."],tips:["<strong>Reference Design Systems:</strong> Mention specific design systems or component libraries in your prompt—v0 works particularly well with shadcn/ui, Radix UI, and Tailwind CSS since it generates code with these by default.","<strong>Upload Screenshots for Inspiration:</strong> Attach a screenshot of a UI you like and ask v0 to recreate or adapt it. The vision model helps it match layout, spacing, and visual style.","<strong>Deploy to Vercel Instantly:</strong> Connect your Vercel account and deploy generated apps to a live URL in one click—ideal for sharing prototypes with clients or getting user feedback quickly.","<strong>Ask for Specific States:</strong> Request loading states, error states, and empty states explicitly. Well-rounded UI components handle all these edge cases and make for much more production-ready code."]},Rp={whatIs:"Notion AI is a built-in AI teammate integrated throughout Notion's workspace. It can draft documents, summarize meeting notes, answer questions about your workspace content, automate repetitive tasks, and connect to external tools like Slack, Google Drive, and GitHub—acting as an intelligent assistant that understands the full context of your work.",useCases:["<strong>Meeting Notes & Summaries:</strong> Automatically summarize meeting transcripts, extract action items, and create structured follow-up documents that your team can act on immediately.","<strong>Document Drafting:</strong> Describe a document you need—project brief, performance review, proposal—and Notion AI writes a complete first draft using context from your existing workspace.","<strong>Knowledge Search:</strong> Ask Notion AI questions like 'What was the Q3 marketing strategy?' and it searches across all your pages, databases, and connected apps to find the answer.","<strong>Task & Project Automation:</strong> Use AI autofill in Notion databases to automatically generate summaries, tags, and status updates for database items based on their content."],gettingStarted:["<strong>Enable Notion AI:</strong> Notion AI is available on paid plans. Go to your workspace Settings and ensure AI is enabled. If you're on a free plan, you can try it with a limited number of monthly uses.","<strong>Use the AI Block:</strong> On any Notion page, type <code>/AI</code> to insert an AI block. You can ask it to write, summarize, translate, or analyze content on that page.","<strong>Highlight Text to Edit:</strong> Select any existing text in a page, click the AI button that appears, and choose an action: improve writing, fix grammar, make shorter, or change tone.","<strong>Ask Anything in Q&A:</strong> Open Notion AI chat (the sidebar icon) and ask a question. It will search your connected workspace—pages, databases, Slack channels, and Google Docs—to find relevant answers.","<strong>Autofill Database Properties:</strong> In a Notion database, add an AI-powered property and configure it to auto-generate summaries, action items, or categories for each entry based on its content."],tips:["<strong>Connect External Apps:</strong> Link Slack, Jira, Google Drive, and GitHub to Notion AI so it can answer questions that span multiple tools—like 'What did the team decide about the feature in Slack last week?'","<strong>Use Templates with AI:</strong> Notion's template gallery includes AI-powered templates for meeting notes, project plans, and OKRs that have AI actions pre-built in for your most common workflows.","<strong>Build a Company Wiki:</strong> The more your team documents in Notion, the more valuable AI Q&A becomes—it essentially becomes a searchable, conversational knowledge base for your organization.","<strong>Generate Database Summaries:</strong> For project trackers and CRM databases, use AI summary properties to automatically maintain a one-line summary of each row—keeping the database scannable at a glance."]},qp={whatIs:"Humata AI is an AI document analyst that lets you upload PDFs, research papers, contracts, and other files, then ask natural language questions about them. It provides answers grounded in your documents with cited source references, allowing you to extract insights, compare documents, and understand complex material far faster than reading manually.",useCases:["<strong>Research Paper Analysis:</strong> Upload academic papers and ask targeted questions—'What methodology did they use?' or 'What were the key findings?'—to extract insights without reading every word.","<strong>Contract Review:</strong> Ask Humata to identify key clauses, obligations, deadlines, and potential risks in legal documents, speeding up contract review significantly.","<strong>Study & Learning:</strong> Upload textbooks, lecture notes, or course materials and ask questions to test your understanding, get explanations, and create study summaries.","<strong>Comparative Document Analysis:</strong> Upload multiple related documents and ask Humata to compare them—find differences between contract versions, compare research methodologies, or reconcile conflicting reports."],gettingStarted:["<strong>Sign Up:</strong> Go to humata.ai and create a free account. The free plan allows a limited number of pages per month—sufficient for testing with a few documents.","<strong>Upload Your Document:</strong> Click 'Upload' and select a PDF or document file. Humata processes and indexes it, usually in under a minute for most documents.","<strong>Ask Your First Question:</strong> Once processed, type a question in the chat box. Start with broad questions like 'What is this document about?' then move to specific queries.","<strong>Review Cited Sources:</strong> Humata highlights the specific section of the document that supports each answer. Click the citation to jump directly to that passage and verify the context.","<strong>Upload Multiple Files:</strong> Create a folder to upload multiple related documents, then ask questions that draw on information across all of them simultaneously."],tips:["<strong>Ask Specific Questions:</strong> Instead of 'Tell me about this document,' ask focused questions like 'What are the payment terms?' or 'Summarize the limitations section' for more useful answers.","<strong>Use for Dense Technical Docs:</strong> Humata shines with long, dense documents like technical manuals, financial reports, and lengthy research—documents where finding a specific answer would normally take hours.","<strong>Export Summaries:</strong> Ask Humata to 'write a one-page summary of this document' and copy the output for quick briefings, annotations, or sharing with colleagues.","<strong>Cross-Reference Claims:</strong> When reviewing any document, ask 'Are there any inconsistencies in this document?' or 'Does the conclusion align with the data presented?' to get a critical analysis."]},Op={whatIs:"Microsoft Copilot is Microsoft's AI assistant powered by large language models and integrated throughout Windows, Microsoft 365 (Word, Excel, PowerPoint, Outlook, Teams), and Edge browser. It can write documents, analyze spreadsheet data, create presentations, draft emails, summarize meetings, generate images, and browse the web—all within the tools you already use every day.",useCases:["<strong>Microsoft 365 Document Drafting:</strong> In Word, ask Copilot to draft a first version of any document—reports, proposals, job descriptions—based on a brief description and existing content.","<strong>Excel Data Analysis:</strong> In Excel, ask Copilot to analyze your data, identify trends, create charts, and generate formulas using plain language instead of writing complex functions manually.","<strong>PowerPoint Presentation Creation:</strong> Describe your presentation topic and Copilot creates a complete, styled slide deck with relevant content, speaker notes, and suggested visuals.","<strong>Email Drafting & Summarization in Outlook:</strong> Let Copilot summarize long email threads so you can catch up quickly, and draft thoughtful replies with the right tone in seconds."],gettingStarted:["<strong>Access Microsoft Copilot:</strong> Visit copilot.microsoft.com for the standalone web experience, or access it within any Microsoft 365 app via the Copilot button in the ribbon or sidebar.","<strong>Try a Web Task:</strong> On copilot.microsoft.com, ask a question, request an image, or ask it to summarize a topic. It uses Bing search to provide up-to-date, cited answers.","<strong>Use Copilot in Word:</strong> Open a Word document and click the Copilot icon. Type 'Draft a project status update for a Q2 website redesign' to generate a full document draft instantly.","<strong>Analyze Data in Excel:</strong> Open an Excel spreadsheet, click the Copilot icon, and type 'Identify the top 5 products by revenue this year and create a bar chart.' Copilot writes the analysis and inserts the chart.","<strong>Summarize a Teams Meeting:</strong> After a Teams meeting with transcription enabled, click Copilot in the meeting chat to get a summary, a list of action items, and key discussion points."],tips:["<strong>Start with Context:</strong> The more context you give Copilot about your role, audience, and purpose, the more accurate and useful the output. Start prompts with 'I am a [role] and need...'","<strong>Use Copilot in Edge:</strong> The Edge sidebar Copilot can read the current webpage and answer questions about it—useful for research, summarizing articles, or comparing products without switching tabs.","<strong>Leverage Copilot in Teams:</strong> Use Copilot during live meetings to get real-time summaries, ask 'What decisions have been made so far?' and receive catch-up summaries if you join late.","<strong>Check Your Microsoft 365 License:</strong> Full Copilot integration in Word, Excel, and PowerPoint requires a Microsoft 365 Copilot add-on license—verify this with your IT admin before expecting all features to be available."]},Gp={whatIs:"Khanmigo is Khan Academy's AI-powered educational assistant built on GPT-4. Rather than simply giving students answers, it acts as a Socratic tutor—guiding learners to discover answers themselves through targeted questions and hints. For teachers, it provides tools for lesson planning, rubric creation, essay feedback, and generating practice exercises.",useCases:["<strong>Personalized Tutoring:</strong> Students receive step-by-step guidance on math problems, science concepts, and writing tasks with the AI asking leading questions that build understanding rather than dependence.","<strong>Essay & Writing Coaching:</strong> Khanmigo reads student drafts and provides constructive feedback on thesis clarity, argument structure, and evidence—without just rewriting it for them.","<strong>Lesson Plan Generation:</strong> Teachers describe a learning objective and grade level, and Khanmigo generates a complete lesson plan with activities, discussion questions, and differentiation strategies.","<strong>Test & Quiz Preparation:</strong> Students can ask Khanmigo to quiz them on any topic, explain concepts in different ways, and identify which areas need more practice."],gettingStarted:["<strong>Access Khanmigo:</strong> Go to khanmigo.ai to sign up. Khanmigo is available for a monthly subscription, with free access available for teachers in certain programs.","<strong>Start a Tutoring Session:</strong> Click 'Learn with Khanmigo' and select a subject or topic. Type your question or describe what you're struggling with, and the AI will guide you through it.","<strong>Try the Teacher Tools:</strong> If you're a teacher, select 'I'm a Teacher' to access tools like Lesson Hook Creator, Rubric Generator, and Lesson Plan Generator from the teacher dashboard.","<strong>Work Through a Problem:</strong> Type out a math problem or essay prompt you're working on. Khanmigo will ask what you've tried so far and help you reason through each step.","<strong>Use Debate Mode:</strong> Try 'Debate an Idea' to have Khanmigo take an opposing position on a topic, helping students practice argumentation and critical thinking."],tips:["<strong>Embrace the Socratic Method:</strong> Don't be frustrated when Khanmigo asks questions instead of giving answers—the process of reasoning through the question is exactly how learning happens. Engage with it.","<strong>Use for Pre-Reading:</strong> Before a lesson, ask Khanmigo to explain prerequisite concepts so students arrive better prepared. It can tailor explanations to any grade level.","<strong>Teacher: Create Rubrics Quickly:</strong> Paste your assignment description into the Rubric Generator and Khanmigo will draft a detailed, criteria-based rubric you can refine and distribute to students.","<strong>Assign as Homework Helper:</strong> Teachers can recommend Khanmigo as a safe, educationally sound homework helper that won't just do the work for students—giving parents confidence in its use."]},jp={whatIs:"Gradescope is an AI-assisted grading platform used by universities and schools to streamline grading of handwritten exams, programming assignments, and online assessments. Its AI groups similar student responses together so instructors can grade an entire cluster of responses with a single rubric action, dramatically reducing grading time while improving consistency.",useCases:["<strong>Exam Grading at Scale:</strong> Upload scanned paper exams and use AI-assisted grouping to grade 30 nearly identical wrong answers simultaneously instead of one at a time—cutting grading time by up to 70%.","<strong>Programming Assignment Grading:</strong> Automatically run test cases on student code submissions and aggregate results in a structured gradebook with detailed per-test-case feedback.","<strong>Rubric-Based Assessment:</strong> Build detailed rubrics in Gradescope and apply them consistently across all submissions—the platform ensures every student is graded against identical criteria.","<strong>Regrade Requests Management:</strong> Students can submit regrade requests directly in the platform, where instructors can review and respond with a clear audit trail."],gettingStarted:["<strong>Create a Gradescope Account:</strong> Go to gradescope.com and sign up. Instructors can use it free with limited features, or institutions can license it for full access.","<strong>Create an Assignment:</strong> Click 'Create Assignment,' choose the type (Exam/Quiz, Programming Assignment, or Homework), and configure the settings including total points and submission method.","<strong>Upload a Template:</strong> For paper-based exams, upload a blank copy of the exam as a PDF template. Outline each question region so Gradescope knows where to find student answers.","<strong>Collect Submissions:</strong> Students submit digitally via the Gradescope portal, or you can scan and upload physical exams in bulk using any standard scanner or scanner app.","<strong>Grade with AI Grouping:</strong> Open the grading view for a question. Gradescope clusters visually similar answers together. Select a cluster, write rubric feedback once, and apply it to all grouped responses."],tips:["<strong>Build Rubrics Collaboratively:</strong> Create your rubric items as you encounter the first few submissions—by the time you've seen 10-15 responses, you'll have a comprehensive rubric that covers the most common mistakes.","<strong>Use Variable-Length Rubrics:</strong> Gradescope supports negative-scoring rubrics (deducting from full marks) and positive rubrics (awarding points)—choose the format that best fits your grading philosophy.","<strong>Export to LMS Gradebook:</strong> Connect Gradescope to Canvas, Blackboard, or Moodle to sync final grades directly to your LMS gradebook without manual data entry.","<strong>Analyze Class Statistics:</strong> Use the Statistics view after grading to see score distributions, identify which questions had the most deductions, and pinpoint concepts that need re-teaching."]},Bp={whatIs:"Miro is a collaborative online whiteboard platform, and Miro AI adds intelligent automation that can convert messy sticky note clusters into structured diagrams, generate mind maps and flowcharts from text prompts, summarize board content, create images, and automate visual workflow creation—making collaborative brainstorming faster and more organized.",useCases:["<strong>Brainstorming to Structure:</strong> After a sticky note brainstorm, use Miro AI to automatically cluster, label, and organize notes into affinity diagrams or mind maps, eliminating hours of manual sorting.","<strong>Diagram Generation:</strong> Describe a process or system in text and have Miro AI generate a flowchart, org chart, or mind map visualization automatically on the board.","<strong>Workshop Facilitation:</strong> Use AI-generated icebreakers, agenda templates, and retrospective frameworks to set up collaborative sessions faster, with content pre-populated based on your team's context.","<strong>Content Summarization:</strong> After a crowded ideation session, ask Miro AI to summarize all the sticky notes on a board into a concise action list or decision document."],gettingStarted:["<strong>Create a Miro Account:</strong> Go to miro.com and sign up for free. The free plan includes three editable boards, which is enough to explore AI features.","<strong>Open a Board:</strong> Create a new board or open an existing one. Use Miro AI from the toolbar by clicking the Miro AI button (wand icon) or right-clicking on selected elements.","<strong>Generate a Mind Map:</strong> Click the Miro AI button and select 'Generate mind map.' Type a central topic and Miro AI will create an expanding mind map with branches and sub-topics on your board.","<strong>Summarize Sticky Notes:</strong> Select a cluster of sticky notes on your board, right-click, choose 'Miro AI,' then select 'Summarize' to get a condensed overview of all the ideas.","<strong>Use Magic Frames:</strong> Insert a Miro AI frame, type a description of what kind of diagram or content you need, and it will generate a structured visual directly on your board."],tips:["<strong>Tag Stickies for Better Clustering:</strong> Encourage participants to use consistent color coding for sticky notes (e.g., green for ideas, red for blockers) so AI clustering produces more meaningful groupings.","<strong>Use for Sprint Retrospectives:</strong> Create a retro board with AI-generated prompts for 'What went well,' 'What didn't,' and 'Action items,' then use AI to synthesize the results into a summary.","<strong>Combine with Video Calls:</strong> Miro integrates with Zoom and Teams—run live collaborative sessions where multiple people edit the board simultaneously while on a video call.","<strong>Export AI Outputs:</strong> Export generated diagrams and mind maps as PDFs, PNGs, or structured data to include in reports, documentation, or presentations outside Miro."]},Np={whatIs:"ElevenLabs is the leading AI voice platform known for producing the most realistic and expressive text-to-speech voices available. It offers voice cloning from just a few seconds of audio, multilingual dubbing of video content in 35+ languages, a vast library of pre-built voices, and an API for integrating voice into apps, games, and content workflows.",useCases:["<strong>Content Narration:</strong> Generate professional-quality voiceovers for YouTube videos, podcasts, explainer videos, and audiobooks using lifelike AI voices—no recording studio required.","<strong>Voice Cloning:</strong> Clone your own voice (or a licensed voice) from a short audio sample to create consistent voiceovers that sound authentically like you at any scale.","<strong>Multilingual Video Dubbing:</strong> Use ElevenLabs Dubbing to translate and re-voice any video into dozens of languages with voices that match the original speaker's tone and emotion.","<strong>App & Game Voice Integration:</strong> Use the ElevenLabs API to add dynamic, real-time text-to-speech to applications, games, virtual assistants, and accessibility tools."],gettingStarted:["<strong>Sign Up:</strong> Go to elevenlabs.io and create a free account. The free plan includes a monthly character limit for TTS generation—enough to test voices and small projects.","<strong>Try Text to Speech:</strong> Navigate to the 'Speech Synthesis' tab, type or paste your text, and select a voice from the library. Click 'Generate' to hear your text spoken aloud.","<strong>Browse the Voice Library:</strong> Explore the Voice Library tab to find voices by gender, age, accent, and use case. Preview voices before using them in your projects.","<strong>Clone a Voice:</strong> Go to 'Voice Lab' and click 'Add a Generative or Cloned Voice.' Upload 1-5 minutes of clean audio to create a custom voice clone.","<strong>Use the API:</strong> Access your API key in Settings > API Key. Use the ElevenLabs API documentation to integrate TTS into your applications with just a few lines of code."],tips:["<strong>Use Voice Settings:</strong> Adjust Stability (consistency vs. expressiveness) and Similarity Boost sliders for each voice to fine-tune how it sounds for your specific content type.","<strong>Add SSML-like Breaks:</strong> Insert ellipses (...) or dashes (—) in your text to create natural pauses and more human-sounding speech rhythm.","<strong>Use High-Quality Audio for Cloning:</strong> For voice cloning, record in a quiet environment with a good microphone. Clean audio without background noise produces significantly better clone quality.","<strong>Projects Feature for Long Content:</strong> Use the 'Projects' feature for long-form content like audiobooks. It breaks content into chapters, maintains voice consistency, and allows section-by-section regeneration."]},_p={whatIs:"Soundraw is an AI music generator created by professional musicians, allowing anyone to create unlimited royalty-free music tracks across 30+ genres and moods. Unlike other AI music tools, Soundraw lets you customize the generated tracks by adjusting tempo, instrumentation, song structure, and length—giving you real creative control without requiring music production knowledge.",useCases:["<strong>Video Background Music:</strong> Generate custom background music for YouTube videos, corporate presentations, and social content that fits the exact mood and length you need—no licensing worries.","<strong>Podcast Intros & Outros:</strong> Create unique theme music and transition sounds for podcasts that establish your brand identity without using generic stock music.","<strong>Classroom & Educational Use:</strong> Teachers can generate focus music, background ambiance for work sessions, or upbeat tracks for energizing classroom activities.","<strong>Game & App Prototyping:</strong> Quickly generate placeholder music tracks in various genres for game levels, UI sounds, and app demos before commissioning original compositions."],gettingStarted:["<strong>Sign Up at Soundraw.io:</strong> Go to soundraw.io and create an account. Soundraw offers a free trial to explore the platform and listen to generated tracks before subscribing.","<strong>Set Your Parameters:</strong> Use the genre, mood, tempo, and length selectors to describe the type of music you need. You can combine multiple moods and genres for more nuanced results.","<strong>Generate Tracks:</strong> Click 'Create Music' to generate a batch of track variations. Each result is a unique composition based on your parameters.","<strong>Customize the Track:</strong> Select a track you like and open the customization panel. Adjust the energy curve, change which instruments appear in each section, and modify the song structure.","<strong>Download and Use:</strong> Subscribe to a paid plan to download tracks as high-quality MP3 or WAV files. All downloaded tracks are royalty-free for commercial use."],tips:["<strong>Match Music to Pacing:</strong> Use the energy curve editor to make quiet sections match slow moments in your video and louder sections align with action or key points.","<strong>Create Variations:</strong> Generate multiple variations of the same genre/mood settings to find the one with the right feel. Each generation produces fresh, unique compositions.","<strong>Use the Loop Feature:</strong> For background music that needs to loop seamlessly (like in games or ambient office settings), use Soundraw's loop-optimized export setting.","<strong>Layer Multiple Tracks:</strong> For complex projects, generate separate tracks for different scenes and use video editing software to crossfade between them for a more dynamic soundtrack."]},Hp={whatIs:"Udio is an AI music creation platform that generates complete, original songs—including vocals, lyrics, and full instrumentation—from text prompts. It can produce music across virtually any genre, from pop and hip-hop to classical and jazz, with a quality level that rivals professionally produced tracks.",useCases:["<strong>Original Song Creation:</strong> Generate complete original songs with vocals and instrumentation from a text description of genre, mood, theme, and lyrical content.","<strong>Creative Exploration:</strong> Experiment with unusual genre mashups—like 'lo-fi jazz meets EDM with melancholic lyrics about city nights'—to discover unique sounds that spark new creative directions.","<strong>Content Soundtracks:</strong> Create original theme songs, jingles, or background tracks for videos, podcasts, and social media content with a completely custom sound.","<strong>Music Prototyping:</strong> Musicians and producers can use Udio to quickly prototype song concepts, melodies, and arrangements before investing time in full production."],gettingStarted:["<strong>Sign Up at Udio.com:</strong> Go to udio.com and create an account. New users receive free credits to generate songs and explore the platform.","<strong>Write a Prompt:</strong> In the creation box, describe the song you want to make. Include genre, mood, instrumentation, vocal style, and lyrical theme. Example: <code>'An upbeat indie pop song with acoustic guitar and female vocals about finding joy in everyday moments.'</code>","<strong>Add Custom Lyrics (Optional):</strong> Toggle to custom lyrics mode to write your own lyrics and have Udio set them to music in your chosen style.","<strong>Generate and Preview:</strong> Click 'Create' to generate two song variants. Each is a complete, full-length song. Listen to both and choose which better captures your vision.","<strong>Extend and Edit:</strong> Use the 'Extend' feature to lengthen a song by adding new sections, or use 'Remix' to generate variations that maintain the core style while changing specific elements."],tips:["<strong>Use Genre Tags:</strong> Adding specific genre tags in brackets—like <code>[indie pop]</code>, <code>[80s synth-pop]</code>, or <code>[orchestral film score]</code>—helps Udio nail the right sound more precisely.","<strong>Describe Vocal Style:</strong> Specify the vocal type you want—'breathy female vocals,' 'gritty male baritone,' 'choir harmonies,' or 'no vocals, instrumental only'—for more targeted results.","<strong>Iterate with Remix:</strong> If you like the core melody but want different lyrics or energy, use the Remix feature to generate variations that preserve what you like while changing specific aspects.","<strong>Save Your Favorites:</strong> Udio allows you to save and organize songs in your library. Save any generation you like even if you're not sure you'll use it—good outputs can be repurposed later."]},Ha=[{tags:"writing coding conversation summarization",name:"ChatGPT",url:"https://chatgpt.com",description:"Your versatile partner for conversation, content creation, and coding.",emoji:"💬",tutorial:ih,audience:["Developers","Business Professionals","AI Enthusiasts"]},{tags:"multimodal writing coding conversation google summarization image-analysis",name:"Gemini",url:"https://gemini.google.com",description:"Google's multimodal AI for understanding text, images, code, and video.",emoji:"🤖",tutorial:sh,audience:["AI Enthusiasts","Developers","Creatives"]},{tags:"real-time social-media writing news",name:"Grok",url:"https://grok.x.ai",description:"Real-time insights and a bit of wit from the X (formerly Twitter) platform.",emoji:"🧠",tutorial:rh,audience:["Business Professionals","AI Enthusiasts"]},{tags:"research writing search summarization",name:"Perplexity AI",url:"https://www.perplexity.ai",description:"An AI-powered answer engine that provides sourced, citation-backed results.",emoji:"🔎",tutorial:lh,audience:["Business Professionals","AI Enthusiasts"]},{tags:"research writing notes summarization",name:"NotebookLM",url:"https://notebooklm.google.com",description:"An expert in your own documents for targeted research and analysis.",emoji:"📚",tutorial:ch,audience:["Business Professionals","AI Enthusiasts"]},{tags:"presentation design writing",name:"Gamma",url:"https://gamma.app",description:"Create beautiful presentations, documents, and webpages from a simple text prompt.",emoji:"📊",tutorial:uh,audience:["Business Professionals","Entrepreneurs","AI Enthusiasts"]},{tags:"notes ideas writing",name:"Napkin",url:"https://www.napkin.one",description:"Surfaces surprising connections and insights between your notes and ideas.",emoji:"💡",tutorial:dh,audience:["Business Professionals","AI Enthusiasts"]},{tags:"brainstorming collaboratio
